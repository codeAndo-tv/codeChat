<!-- div.chat-layout: contenedor principal de la pantalla de chat -->
<!-- Usa display:flex para poner sidebar y chat uno al lado del otro -->
<div class="chat-layout">

  <!-- ============================================ -->
  <!-- BARRA LATERAL (sidebar)                     -->
  <!-- ============================================ -->
  <aside class="sidebar">
    
    <!-- div: agrupa la parte superior del sidebar -->
    <div>
      
      <!-- button: botón para crear un nuevo chat -->
      <!-- class="new-chat-btn": estilos del botón (fondo oscuro, borde gris) -->
      <button class="new-chat-btn">+ New chat</button>

      <!-- p.section-title: título de sección en mayúsculas y gris -->
      <p class="section-title">YOUR CHATS</p>

      <!-- p.section-title: subtítulo para el filtro de búsqueda -->
      <p class="section-title">Filter chats</p>

      <!-- input: campo de texto para filtrar conversaciones por título -->
      <!-- class="chat-filter-input": estilos del input de filtro -->
      <input class="chat-filter-input" type="text" placeholder="Type to filter by title">

      <!-- ul.chat-list: lista de conversaciones (sin viñetas) -->
      <ul class="chat-list">
        
        <!-- li.chat-item.active: conversación seleccionada (fondo resaltado) -->
        <li class="chat-item active">
          Final project planning
        </li>

        <!-- li.chat-item: conversación normal (sin resaltar) -->
        <li class="chat-item">
          REST endpoint questions
        </li>

        <!-- li.chat-item: otra conversación -->
        <li class="chat-item">
          Docker setup help
        </li>

      </ul>
    </div>

    <!-- div.sidebar-bottom: parte inferior del sidebar (usuario y logout) -->
    <div class="sidebar-bottom">
      
      <!-- div.user-card: tarjeta con avatar y nombre del usuario -->
      <div class="user-card">
        
        <!-- span.user-avatar: círculo rojo coral con las iniciales -->
        <!-- Por ahora tiene "U" fijo, después se llenará desde TypeScript -->
        <span class="user-avatar">U</span>
        
        <!-- span: nombre del usuario (por ahora fijo) -->
        <span>Username</span>
        
      </div>

      <!-- span: texto de logout (después será un botón con evento click) -->
      <button class="logout-btn" (click)="onLogout()">Log out</button>
      
    </div>
  </aside>

  <!-- ============================================ -->
  <!-- ÁREA PRINCIPAL (chat-main)                  -->
  <!-- ============================================ -->
  <main class="chat-main">

    <!-- header.chat-header: cabecera con título e info de conversación activa -->
    <header class="chat-header">
      
      <!-- div.brand-block: agrupa el logo y el título de la app -->
      <div class="brand-block">
        <!-- h1: nombre de la aplicación en grande -->
        <h1>codeChat</h1>
      </div>

      <!-- p: muestra qué conversación está activa en este momento -->
      <p>Active conversation: Final project planning</p>
      
    </header>

    <!-- section.messages: área donde se muestran los mensajes -->
    <section class="messages">
      
      <!-- p: mensaje de ejemplo del asistente -->
      <p>Hi! Ready to review today's class goals?</p>
      
      <!-- p: mensaje de ejemplo del usuario -->
      <p>Yes, show me the checkpoint for class 2.</p>
      
    </section>

    <!-- div.composer-wrap: barra inferior para escribir mensajes -->
    <div class="composer-wrap">
      
      <!-- div.composer: contiene el textarea y el botón de enviar -->
      <div class="composer">
        
        <!-- textarea: campo de texto multilínea para escribir el mensaje -->
        <!-- placeholder: texto que se ve cuando el campo está vacío -->
        <textarea placeholder="Escribe un mensaje..."></textarea>
        
        <!-- button: botón para enviar el mensaje -->
        <button>Send</button>
        
      </div>
    </div>

  </main>
</div>
