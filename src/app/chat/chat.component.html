<div class="chat-layout">
  <aside class="sidebar">
    <div>
      <button class="new-chat-btn">+ New chat</button>

      <p class="section-title">YOUR CHATS</p>

      <p class="section-title">Filter chats</p>

      <input
        class="chat-filter-input"
        type="text"
        placeholder="Type to filter by title"
      />

      <ul class="chat-list">
        <li class="chat-item active">Final project planning</li>

        <li class="chat-item">REST endpoint questions</li>

        <li class="chat-item">Docker setup help</li>
      </ul>
    </div>

    <div class="sidebar-bottom">
      <div class="user-card">
        <span class="user-avatar">U</span>

        <span>Username</span>
      </div>

      <button class="log-out" (click)="onLogout()">Log out</button>
    </div>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div class="brand-block">
        <h1>codeChat</h1>
      </div>

      <p>Active conversation: Final project planning</p>
    </header>

    <section class="messages">
      <p>Hi! Ready to review today's class goals?</p>

      <p>Yes, show me the checkpoint for class 2.</p>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <textarea placeholder="Escribe un mensaje..."></textarea>

        <button>Send</button>
      </div>
    </div>
  </main>
</div>
